<html lang="es">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#111;color:#eee;padding:12px;font-size:14px}
h1{font-size:1.3rem;color:#f0c040;margin-bottom:4px}
.sub{font-size:0.72rem;color:#777;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.status{font-size:0.68rem;padding:2px 8px;border-radius:20px;font-weight:600}
.status.online{background:rgba(78,202,127,0.15);color:#4eca7f}
.status.offline{background:rgba(224,90,43,0.15);color:#e05a2b}
.status.loading{background:rgba(240,192,64,0.15);color:#f0c040}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.card{background:#1e1e1e;border:1px solid #333;border-radius:10px;padding:14px;border-left:3px solid #f0c040}
.card.g{border-left-color:#4eca7f}.card.b{border-left-color:#88aaff}
.card label{font-size:0.65rem;text-transform:uppercase;color:#666;display:block;margin-bottom:4px;letter-spacing:1px}
.card .val{font-size:1.4rem;font-weight:700;color:#f0c040}
.card.g .val{color:#4eca7f}.card.b .val{color:#88aaff}
.card .s{font-size:0.7rem;color:#555;margin-top:3px}
.form-box{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:14px;margin-bottom:14px}
.form-box h2{font-size:0.9rem;color:#f0c040;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.form-tabs{display:flex;gap:8px;margin-bottom:14px}
.ftab{background:#252525;border:1px solid #333;border-radius:6px;padding:6px 16px;color:#666;cursor:pointer;font-size:0.8rem;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.ftab.on{background:#f0c040;color:#111;border-color:#f0c040;font-weight:600}
.ftab.red.on{background:#e05a2b;border-color:#e05a2b;color:#fff}
.frow{display:none}.frow.on{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.f{display:flex;flex-direction:column;gap:4px;flex:1;min-width:90px}
.f label{font-size:0.65rem;color:#666;text-transform:uppercase;letter-spacing:0.8px}
.f input,.f select{background:#252525;border:1px solid #444;border-radius:6px;padding:8px;color:#eee;font-size:0.85rem;outline:none;width:100%}
.f input:focus,.f select:focus{border-color:#f0c040}
.btn{background:#f0c040;color:#111;border:none;border-radius:6px;padding:9px 20px;font-weight:700;cursor:pointer;font-size:0.85rem;white-space:nowrap}
.btn:hover{opacity:0.85}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn.red{background:#e05a2b;color:#fff}
.filters{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.fb{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:5px 12px;color:#666;font-size:0.75rem;cursor:pointer;font-family:'DM Sans',sans-serif}
.fb.on,.fb:hover{border-color:#f0c040;color:#f0c040}
.toggle{display:flex;align-items:center;gap:6px;margin-left:auto;font-size:0.75rem;color:#666;cursor:pointer}
.toggle input{cursor:pointer;accent-color:#f0c040}
.tbl-wrap{background:#1a1a1a;border:1px solid #333;border-radius:10px;overflow:auto;max-height:420px}
table{width:100%;border-collapse:collapse;min-width:700px}
thead{position:sticky;top:0;background:#252525}
th{padding:9px 12px;text-align:left;font-size:0.65rem;text-transform:uppercase;color:#555;letter-spacing:1px}
td{padding:9px 12px;border-bottom:1px solid #222;font-size:0.82rem}
tr:hover td{background:#1f1f1f}
tr.nowork td{color:#333;font-style:italic}
.g{color:#4eca7f;font-weight:600}.y{color:#f0c040;font-weight:600}.m{color:#555}
.delbtn{background:none;border:1px solid #333;border-radius:4px;color:#555;padding:2px 8px;cursor:pointer;font-size:0.72rem}
.delbtn:hover{border-color:#e05a2b;color:#e05a2b}
.empty{text-align:center;padding:40px;color:#444}
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:7px 18px;color:#666;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.82rem}
.tab.on{background:#f0c040;color:#111;border-color:#f0c040;font-weight:600}
.panel{display:none}.panel.on{display:block}
.scard{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:16px;margin-bottom:12px}
.scard h3{font-size:0.82rem;color:#f0c040;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.sr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:0.82rem}
.sr:last-child{border:none}.sr .lbl{color:#666}.sr .vv{font-weight:600}
.bar-bg{background:#252525;border-radius:99px;height:12px;margin:8px 0 4px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#4eca7f,#f0c040);border-radius:99px}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid #333;border-top-color:#f0c040;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.print{background:#4eca7f;color:#111}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:#1a1a1a;border:1px solid #333;border-radius:14px;padding:24px;width:320px;max-width:95vw}
.modal h3{font-size:1rem;color:#f0c040;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
.modal select{width:100%;background:#252525;border:1px solid #444;border-radius:6px;padding:10px;color:#eee;font-size:0.9rem;outline:none;margin-bottom:16px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.btn.gray{background:#333;color:#aaa}
/* Estilos de impresión */
@media print{
  body{background:#fff !important;color:#000 !important;padding:0;font-size:12px}
  .no-print{display:none !important}
  .print-area{display:block !important}
  .print-header{margin-bottom:16px;border-bottom:2px solid #000;padding-bottom:10px}
  .print-header h2{font-size:1.2rem;font-weight:700}
  .print-header p{font-size:0.8rem;color:#444;margin-top:4px}
  .print-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .print-card{border:1px solid #ccc;border-radius:6px;padding:10px}
  .print-card label{font-size:0.65rem;text-transform:uppercase;color:#666;display:block;margin-bottom:4px}
  .print-card .val{font-size:1.1rem;font-weight:700}
  .print-table{width:100%;border-collapse:collapse;margin-bottom:16px}
  .print-table th{background:#f0f0f0;padding:7px 8px;text-align:left;font-size:0.68rem;text-transform:uppercase;border:1px solid #ccc}
  .print-table td{padding:6px 8px;border:1px solid #ddd;font-size:0.8rem}
  .print-table tr.nowork td{color:#aaa;font-style:italic}
  .print-medios{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
  .print-medio{border:1px solid #ccc;border-radius:6px;padding:8px;text-align:center}
  .print-medio label{font-size:0.65rem;text-transform:uppercase;color:#666;display:block}
  .print-medio .val{font-size:1rem;font-weight:700}
}
.print-area{display:none}
@media(max-width:600px){
  .cards{grid-template-columns:repeat(2,1fr)}
  .frow.on{flex-direction:column}
  .f{min-width:100%}
}
</style>

<h1>🚗 Sobre Ruedas Park</h1>
<div class="sub">
  Registro desde 12/12/2025
  <span class="status loading" id="statusBadge"><span class="spinner"></span>Conectando...</span>
</div>

<div class="tabs">
  <div class="tab on" onclick="showTab('reg',this)">📋 Registro</div>
  <div class="tab" onclick="showTab('res',this)">📊 Resumen</div>
  <button class="btn print no-print" onclick="abrirModal()" style="margin-left:auto;padding:7px 16px;font-size:0.82rem">🖨️ Imprimir mes</button>
</div>

<!-- Modal selección mes -->
<div class="modal-bg no-print" id="modalBg">
  <div class="modal">
    <h3>🖨️ Imprimir Mes</h3>
    <select id="selMes">
      <option value="2025-12">Diciembre 2025</option>
      <option value="2026-01">Enero 2026</option>
      <option value="2026-02">Febrero 2026</option>
      <option value="2026-03" selected>Marzo 2026</option>
    </select>
    <div class="modal-btns">
      <button class="btn gray" onclick="cerrarModal()">Cancelar</button>
      <button class="btn print" onclick="imprimir()">Imprimir</button>
    </div>
  </div>
</div>

<div id="reg" class="panel on">
  <div class="cards">
    <div class="card g"><label>Neto Total</label><div class="val" id="cNT">—</div><div class="s" id="cDT">—</div></div>
    <div class="card"><label>Ventas Total</label><div class="val" id="cVT">—</div><div class="s" id="cPT">—</div></div>
    <div class="card b"><label>Neto Marzo</label><div class="val" id="cNM">—</div><div class="s" id="cDM">—</div></div>
    <div class="card"><label>Ventas Marzo</label><div class="val" id="cVM">—</div><div class="s" id="cPM">—</div></div>
  </div>

  <div class="form-box">
    <h2>+ Agregar día</h2>
    <div class="form-tabs">
      <button class="ftab on" onclick="switchForm('work',this)">💰 Día trabajado</button>
      <button class="ftab red" onclick="switchForm('nowork',this)">🚫 No se trabajó</button>
    </div>
    <div id="fwork" class="frow on">
      <div class="f"><label>Fecha</label><input type="date" id="iF"></div>
      <div class="f"><label>Horario</label><input type="text" id="iH" placeholder="19:30-23:00"></div>
      <div class="f"><label>Total $</label><input type="number" id="iT" placeholder="0"></div>
      <div class="f"><label>Efectivo</label><input type="number" id="iE" placeholder="0"></div>
      <div class="f"><label>Transfer.</label><input type="number" id="iTr" placeholder="0"></div>
      <div class="f"><label>Tarjeta</label><input type="number" id="iTa" placeholder="0"></div>
      <div class="f"><label>Pago ayud.</label><input type="number" id="iP" placeholder="0"></div>
      <button class="btn" id="btnAgregar" onclick="agregar()">Agregar</button>
    </div>
    <div id="fnowork" class="frow">
      <div class="f" style="max-width:180px"><label>Fecha</label><input type="date" id="iNF"></div>
      <button class="btn red" id="btnNoWork" onclick="agregarNoWork()">Agregar</button>
    </div>
  </div>

  <div class="filters">
    <button class="fb on" onclick="fil('todos',this)">Todos</button>
    <button class="fb" onclick="fil('2025-12',this)">Dic 25</button>
    <button class="fb" onclick="fil('2026-01',this)">Ene 26</button>
    <button class="fb" onclick="fil('2026-02',this)">Feb 26</button>
    <button class="fb" onclick="fil('2026-03',this)">Mar 26</button>
    <label class="toggle"><input type="checkbox" id="chkNoWork" checked onchange="renderTabla()"> Sin trabajo</label>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>Fecha</th><th>Horario</th><th>Total</th><th>Efectivo</th><th>Transfer.</th><th>Tarjeta</th><th>Pago</th><th>Neto</th><th></th>
      </tr></thead>
      <tbody id="tb"></tbody>
    </table>
    <div class="empty" id="emp">
      <span class="spinner"></span> Cargando datos...
    </div>
  </div>
</div>

<div id="res" class="panel">
  <div id="resContent"><div class="empty"><span class="spinner"></span> Cargando...</div></div>
</div>

<!-- Área de impresión (invisible en pantalla, visible al imprimir) -->
<div class="print-area" id="printArea"></div>

// ─── STATE ────────────────────────────────────────────────────────────────
let extrasWork = [];

let activeFil = 'todos';
let dbReady = false;

// ─── UTILS ────────────────────────────────────────────────────────────────
const neto = r => (r.t||0) - (r.p||0) - (r.o||0);
const fmt = n => '$' + Number(n).toLocaleString('es-CL');
const fd = f => { const[y,m,d]=f.split('-'); return d+'/'+m+'/'+y; };

const allWork = () => [...HISTORICO, ...extrasWork].sort((a,b) => a.f.localeCompare(b.f)||a.id.localeCompare(b.id));
const allNW = () => [...NO_WORK_BASE, ...extrasNoWork];
const allRows = () => [...allWork(), ...allNW().map(r=>({...r,t:0,e:0,tr:0,ta:0,p:0,o:0}))].sort((a,b)=>a.f.localeCompare(b.f)||a.id.localeCompare(b.id));

// ─── FIREBASE LISTENERS ───────────────────────────────────────────────────
function setStatus(type, msg) {
  const el = document.getElementById('statusBadge');
  el.className = 'status ' + type;
  el.innerHTML = type === 'loading' ? `<span class="spinner"></span>${msg}` : msg;
}

// Listen dias trabajados extras
onSnapshot(query(collection(db, 'dias'), orderBy('f')), snap => {
  extrasWork = snap.docs.map(d => ({...d.data(), docId: d.id}));
  dbReady = true;
  setStatus('online', '🟢 Sincronizado');
  render();
}, err => {
  setStatus('offline', '🔴 Sin conexión');
  console.error(err);
});

// Listen dias no trabajados extras
onSnapshot(query(collection(db, 'nowork'), orderBy('f')), snap => {
  extrasNoWork = snap.docs.map(d => ({...d.data(), docId: d.id, nowork: true}));
  render();
});

// ─── RENDER ───────────────────────────────────────────────────────────────
function calcCards() {
  const data = allWork();
  const mar = data.filter(r => r.f.startsWith('2026-03'));
  const nt = data.reduce((a,r) => a+neto(r), 0);
  const vt = data.reduce((a,r) => a+(r.t||0), 0);
  const dias = data.filter(r => (r.t||0) > 0).length;
  const nm = mar.reduce((a,r) => a+neto(r), 0);
  const vm = mar.reduce((a,r) => a+(r.t||0), 0);
  const dm = mar.filter(r => (r.t||0) > 0).length;
  document.getElementById('cNT').textContent = fmt(nt);
  document.getElementById('cDT').textContent = dias + ' días trabajados';
  document.getElementById('cVT').textContent = fmt(vt);
  document.getElementById('cPT').textContent = 'Prom neto: ' + fmt(dias ? Math.round(nt/dias) : 0) + '/día';
  document.getElementById('cNM').textContent = fmt(nm);
  document.getElementById('cDM').textContent = dm + ' días trabajados';
  document.getElementById('cVM').textContent = fmt(vm);
  document.getElementById('cPM').textContent = 'Prom neto: ' + fmt(dm ? Math.round(nm/dm) : 0) + '/día';
}

function renderTabla() {
  const showNW = document.getElementById('chkNoWork').checked;
  let data = allRows();
  if (!showNW) data = data.filter(r => !r.nowork);
  if (activeFil !== 'todos') data = data.filter(r => r.f.startsWith(activeFil));
  data = [...data].reverse();

  const tb = document.getElementById('tb');
  const emp = document.getElementById('emp');

  if (!data.length) { tb.innerHTML = ''; emp.style.display = 'block'; emp.textContent = 'Sin registros'; return; }
  emp.style.display = 'none';

  tb.innerHTML = data.map(r => {
    if (r.nowork) {
      const isDel = extrasNoWork.find(e => e.id === r.id);
      return `<tr class="nowork">
        <td>${fd(r.f)}</td>
        <td colspan="7" style="color:#2a2a2a">${r.h}</td>
        <td>${isDel ? `<button class="delbtn" onclick="window._delNW('${isDel.docId}')">✕</button>` : ''}</td>
      </tr>`;
    }
    const n = neto(r);
    const isExtra = extrasWork.find(e => e.id === r.id);
    return `<tr>
      <td>${fd(r.f)}</td>
      <td class="m">${r.h||'—'}</td>
      <td class="y">${r.t ? fmt(r.t) : '<span class="m">—</span>'}</td>
      <td class="m">${r.e ? fmt(r.e) : '—'}</td>
      <td class="m">${r.tr ? fmt(r.tr) : '—'}</td>
      <td class="m">${r.ta ? fmt(r.ta) : '—'}</td>
      <td style="color:#c0553a">${r.p ? fmt(r.p) : '—'}</td>
      <td class="${n >= 0 ? 'g' : ''}" style="${n < 0 ? 'color:#e05a2b' : ''}">${fmt(n)}</td>
      <td>${isExtra ? `<button class="delbtn" onclick="window._del('${isExtra.docId}')">✕</button>` : ''}</td>
    </tr>`;
  }).join('');
}

function render() { calcCards(); renderTabla(); }

window.agregar = async () => {
  const f = document.getElementById('iF').value;
  const t = parseFloat(document.getElementById('iT').value) || 0;
  if (!f || t <= 0) { alert('Ingresa fecha y total.'); return; }
  const btn = document.getElementById('btnAgregar');
  btn.disabled = true; btn.textContent = 'Guardando...';
  try {
    await addDoc(collection(db, 'dias'), {
      id: 'u' + Date.now(),
      f, h: document.getElementById('iH').value || '—',
      t, e: parseFloat(document.getElementById('iE').value)||0,
      tr: parseFloat(document.getElementById('iTr').value)||0,
      ta: parseFloat(document.getElementById('iTa').value)||0,
      p: parseFloat(document.getElementById('iP').value)||0, o: 0
    });
    ['iT','iE','iTr','iTa','iP','iH'].forEach(id => document.getElementById(id).value = '');
  } catch(e) { alert('Error al guardar. Revisa tu conexión.'); }
  btn.disabled = false; btn.textContent = 'Agregar';
};

window.agregarNoWork = async () => {
  const f = document.getElementById('iNF').value;
  if (!f) { alert('Selecciona una fecha.'); return; }
  const btn = document.getElementById('btnNoWork');
  btn.disabled = true; btn.textContent = 'Guardando...';
  try {
    await addDoc(collection(db, 'nowork'), {
      id: 'nwu' + Date.now(), f, h: 'NO SE TRABAJÓ'
    });
    document.getElementById('iNF').value = '';
  } catch(e) { alert('Error al guardar.'); }
  btn.disabled = false; btn.textContent = 'Agregar';
};

window._del = async (docId) => {
  if (!confirm('¿Eliminar este registro?')) return;
  await deleteDoc(doc(db, 'dias', docId));
};

window._delNW = async (docId) => {

};

  const mes = document.getElementById('selMes').value;

  const nt = workData.reduce((a,r)=>a+neto(r),0);
